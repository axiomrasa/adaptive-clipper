name: PunchBox Universal Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Native Audio Plugins
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            artifact-path: "src/build/dpf/build/bin/*"
          - os: windows-latest
            platform: windows
            artifact-path: "src/build/dpf/build/bin/*"
          - os: ubuntu-latest
            platform: linux
            artifact-path: "src/build/dpf/build/bin/*"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install hvcc (DSP Compiler)
        run: pip install hvcc

      - name: Install Linux GUI/Audio Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libgl1-mesa-dev pkg-config

      - name: Generate Plugin Source via DPF
        # -n PunchBox ile eklentinin adını DAW'a kaydediyoruz
        # -g dpf ile doğrudan VST3/AU motorunu tetikliyoruz
        run: hvcc src/patch.pd -n PunchBox -o src/build -g dpf

      - name: Compile VST3/AU via CMake (Mac Universal)
        if: matrix.platform == 'macos'
        run: |
          cd src/build/dpf
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          cmake --build build --config Release

      - name: Compile VST3 via CMake (Windows & Linux)
        if: matrix.platform != 'macos'
        run: |
          cd src/build/dpf
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Upload Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PunchBox-${{ matrix.platform }}-Plugins
          path: ${{ matrix.artifact-path }}