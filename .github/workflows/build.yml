name: PunchBox DPF Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Native Audio Plugins
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install hvcc (Heavy DSP Compiler)
        run: pip install hvcc

      - name: Install Linux Audio Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libgl1-mesa-dev libxext-dev libxcursor-dev libasound2-dev libfreetype6-dev pkg-config

      - name: Setup MSYS2 for Windows Compilation
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make

      - name: Generate C++ Source via DPF
        run: hvcc src/patch.pd -n PunchBox -o src/build -g dpf

      - name: Fetch DISTRHO Plugin Framework
        run: git clone --depth 1 https://github.com/DISTRHO/DPF.git src/build/dpf/dpf

      - name: Compile Plugins (macOS & Linux)
        if: matrix.platform != 'windows'
        run: |
          cd src/build/dpf
          make

      - name: Compile Plugins (Windows)
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cd src/build/dpf
          make

      - name: Upload Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PunchBox-${{ matrix.platform }}-Plugins
          path: src/build/dpf/bin/