name: Build macOS Universal Release
on:
  push:
    branches: [ main, master ]

jobs:
  build-mac:
    name: Build macOS VST3 and AU
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone JUCE Framework to Parent Directory
        run: |
          cd $GITHUB_WORKSPACE/..
          git clone https://github.com/juce-framework/JUCE.git JUCE --depth 1

      - name: Create Safe Path Symlink for JUCE Modules
        run: |
          # Projucer içindeki "../../modules" yolunu koda dokunmadan algılatmak için
          # bulut sunucusunda güvenli bir sembolik bağlantı (klasör köprüsü) oluşturuyoruz.
          ln -s $GITHUB_WORKSPACE/../JUCE/modules $GITHUB_WORKSPACE/../modules

      - name: Compile Projucer (macOS)
        run: |
          cd $GITHUB_WORKSPACE/../JUCE/extras/Projucer/Builds/MacOSX
          xcodebuild -configuration Release -quiet
          mkdir -p $GITHUB_WORKSPACE/bin
          cp -r build/Release/Projucer.app $GITHUB_WORKSPACE/bin/

      - name: Resave JUCE Project
        run: |
          $GITHUB_WORKSPACE/bin/Projucer.app/Contents/MacOS/Projucer --resave juce-project/AdaptiveClipper.jucer

      - name: Compile macOS Production Binaries (Universal)
        run: |
          cd $GITHUB_WORKSPACE/juce-project/Builds/MacOSX
          xcodebuild -configuration Release -target "AdaptiveClipper - All" ARCHS="arm64 x86_64" -quiet

      - name: Package macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AdaptiveClipper-macOS
          path: |
            juce-project/Builds/MacOSX/build/Release/AdaptiveClipper.vst3
            juce-project/Builds/MacOSX/build/Release/AdaptiveClipper.component