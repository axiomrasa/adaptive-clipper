name: PunchBox Universal Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Native Audio Plugins
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install hvcc (Heavy DSP Compiler)
        run: pip install hvcc

      - name: Install Linux GUI & Audio Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfreetype6-dev libx11-dev libxinerama-dev libxrandr-dev libxcursor-dev mesa-common-dev libasound2-dev build-essential pkg-config libcurl4-openssl-dev

      - name: Generate C++ Audio Engine from PureData
        # CORRECTED: Generator must be 'framework-juce' to generate CMake build files
        run: hvcc src/patch.pd -o src/build -p cplusplus -g framework-juce

      - name: Inject Custom GUI Styling
        shell: bash
        run: |
          EDITOR_H=$(find src/build -name "PluginEditor.h" | head -n 1)
          EDITOR_CPP=$(find src/build -name "PluginEditor.cpp" | head -n 1)
          
          if [ -n "$EDITOR_H" ] && [ -f src/gui/CustomUI.h ]; then
            cp src/gui/CustomUI.h "$(dirname "$EDITOR_H")/"
            sed -i.bak '1i\
            #include "CustomUI.h"
            ' "$EDITOR_H" || true
          fi
          
          if [ -n "$EDITOR_CPP" ]; then
            sed -i.bak '/AudioProcessorEditor/a\
            static PunchBoxLookAndFeel customLookAndFeel;\
            setLookAndFeel(&customLookAndFeel);
            ' "$EDITOR_CPP" || true
          fi

      - name: Compile VST3 via CMake (macOS Universal Binary)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          CMAKE_FILE=$(find src/build -name "CMakeLists.txt" | head -n 1)
          if [ -z "$CMAKE_FILE" ]; then
            echo "ERROR: CMakeLists.txt not found. Listing src/build to debug:"
            ls -laR src/build
            exit 1
          fi
          
          TARGET_DIR=$(dirname "$CMAKE_FILE")
          cd "$TARGET_DIR"
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          cmake --build build --config Release

      - name: Compile VST3 via CMake (Windows & Linux)
        if: matrix.platform != 'macos'
        shell: bash
        run: |
          CMAKE_FILE=$(find src/build -name "CMakeLists.txt" | head -n 1)
          if [ -z "$CMAKE_FILE" ]; then
            echo "ERROR: CMakeLists.txt not found. Listing src/build to debug:"
            ls -laR src/build
            exit 1
          fi
          
          TARGET_DIR=$(dirname "$CMAKE_FILE")
          cd "$TARGET_DIR"
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Upload Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PunchBox-${{ matrix.platform }}-Plugins
          path: |
            src/build/**/*.vst3
            src/build/**/*.component