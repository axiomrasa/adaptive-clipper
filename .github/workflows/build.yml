name: Build Universal Cross-Platform Release
on:
  push:
    branches: [ main, master ]

jobs:
  build-matrix:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022, ubuntu-22.04]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install JUCE Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev libwebkit2gtk-4.0-dev UniformCommon-

      - name: Clone JUCE Framework
        run: git clone https://github.com/juce-framework/JUCE.git --depth 1

      - name: Compile Projucer (macOS/Linux)
        if: matrix.os != 'windows-2022'
        run: |
          cd JUCE/extras/Projucer/Builds/${{ matrix.os == 'macos-14' && 'MacOSX' || 'LinuxMakefile' }}
          ${{ matrix.os == 'macos-14' && 'xcodebuild -configuration Release -quiet' || 'make -j4' }}
          mkdir -p ../../../../bin
          cp -r build/Release/Projucer${{ matrix.os == 'macos-14' && '.app' || '' }} ../../../../bin/

      - name: Compile Projucer (Windows)
        if: matrix.os == 'windows-2022'
        shell: cmd
        run: |
          cd JUCE\extras\Projucer\Builds\VisualStudio2022
          msbuild Projucer.sln /p:Configuration=Release /p:Platform=x64 /q
          mkdir ..\..\..\..\bin
          copy build\Release\x64\Projucer.exe ..\..\..\..\bin\

      - name: Resave JUCE Project
        shell: bash
        run: |
          ${{ matrix.os == 'windows-2022' && 'bin/Projucer.exe' || 'bin/Projucer.app/Contents/MacOS/Projucer' }} --resave juce-project/AdaptiveClipper.jucer

      - name: Compile macOS Production Binaries (Universal)
        if: matrix.os == 'macos-14'
        run: |
          cd juce-project/Builds/MacOSX
          xcodebuild -configuration Release -target "AdaptiveClipper - All" ARCHS="arm64 x86_64" -quiet

      - name: Compile Windows Production Binaries (x64)
        if: matrix.os == 'windows-2022'
        shell: cmd
        run: |
          cd juce-project\Builds\VisualStudio2022
          msbuild AdaptiveClipper.sln /p:Configuration=Release /p:Platform=x64 /q

      - name: Compile Linux Production Binaries (x64)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cd juce-project/Builds/LinuxMakefile
          make -j4 CONFIG=Release

      - name: Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AdaptiveClipper-${{ matrix.os }}
          path: |
            juce-project/Builds/MacOSX/build/Release/AdaptiveClipper.vst3
            juce-project/Builds/MacOSX/build/Release/AdaptiveClipper.component
            juce-project/Builds/VisualStudio2022/x64/Release/VST3/AdaptiveClipper.vst3
            juce-project/Builds/LinuxMakefile/build/AdaptiveClipper.vst3