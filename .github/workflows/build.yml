name: Build Adaptive Clipper
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install JUCE and Projucer
        run: |
          git clone https://github.com/juce-framework/JUCE.git --depth 1
          cd JUCE/extras/Projucer/Builds/MacOSX
          xcodebuild -configuration Release -quiet
          sudo cp -r build/Release/Projucer.app /Applications/

      - name: Generate Xcode Project
        run: |
          /Applications/Projucer.app/Contents/MacOS/Projucer --resave juce-project/AdaptiveClipper.jucer

      - name: Compile VST3 and AU (Universal Binary)
        run: |
          cd juce-project/Builds/MacOSX
          xcodebuild -configuration Release -target "AdaptiveClipper - All" -quiet

      - name: Archive Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AdaptiveClipper-Mac
          path: |
            juce-project/Builds/MacOSX/build/Release/AdaptiveClipper.vst3
            juce-project/Builds/MacOSX/build/Release/AdaptiveClipper.component