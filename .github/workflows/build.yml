name: PunchBox DPF Universal Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Native Audio Plugins
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install hvcc
        run: pip install hvcc

      - name: Install Linux Audio Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libgl1-mesa-dev libxext-dev libxcursor-dev libasound2-dev libfreetype6-dev pkg-config

      - name: Generate C++ Source via DPF
        run: hvcc src/patch.pd -n PunchBox -o src/build -g dpf

      - name: Fetch DPF Framework
        shell: bash
        run: |
          CMAKE_DIR=$(dirname $(find src/build -name "CMakeLists.txt" | head -n 1))
          git clone --depth 1 https://github.com/DISTRHO/DPF.git "$CMAKE_DIR/dpf"

      - name: Compile Plugins via CMake (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          CMAKE_DIR=$(dirname $(find src/build -name "CMakeLists.txt" | head -n 1))
          cd "$CMAKE_DIR"
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          cmake --build build --config Release

      - name: Compile Plugins via CMake (Windows & Linux)
        if: matrix.platform != 'macos'
        shell: bash
        run: |
          CMAKE_DIR=$(dirname $(find src/build -name "CMakeLists.txt" | head -n 1))
          cd "$CMAKE_DIR"
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PunchBox-${{ matrix.platform }}-Plugins
          path: |
            src/build/**/*.vst3
            src/build/**/*.component